# ═══════════════════════════════════════════════════════════════
#  EASTER EGG SYSTEM (Behavioral Notes)
# ═══════════════════════════════════════════════════════════════
# These are implementation notes, not part of the OpenAPI contract.
# Included here for reference since they drive API behavior.
#
# Easter egg trigger probability:
#   base_probability = 0.20
#   streak_bonus = min(streak * 0.02, 0.30)       # +2% per streak day, cap +30%
#   final_probability = clamp(base_probability + streak_bonus, 0.05, 0.50)
#
# Easter egg types and distribution:
#   bonus_xp        — 70% chance when triggered — flat +10 to +50 XP (scaled by level)
#   double_xp       — 25% chance when triggered — XP for this task ×2
#   streak_freeze   —  5% chance when triggered — next missed day won't break streak
#
# Achievement evaluation:
#   After every checkin, evaluate all unearned achievements:
#   - ACH_FIRST_CHECKIN: total_checkins == 1
#   - ACH_STREAK_3: streak == 3
#   - ACH_STREAK_7: streak == 7
#   - ACH_STREAK_30: streak == 30
#   - ACH_LEVEL_5: level >= 5
#   - ACH_LEVEL_10: level >= 10
#   - ACH_TASKS_10: total_tasks_completed >= 10
#   - ACH_TASKS_50: total_tasks_completed >= 50
#   - ACH_TASKS_100: total_tasks_completed >= 100
#   - ACH_ALL_TYPES: has completed >=1 task of each type (theory, practice, output)
#
#   Only the FIRST newly-unlocked achievement is included in the response.
#   If multiple achievements unlock, they are evaluated in priority order
#   as listed above; subsequent unlocks appear in future checkin responses.
