openapi: "3.0.3"
info:
  title: Learning OS API — Phase 3 Enhancements
  description: |
    New API endpoints for Phase 3: AI encouragement engine, user analytics,
    milestones, and event timeline.

    These endpoints extend the v1.0 and v2.0 contracts without breaking changes.
    All v1.0 and v2.0 paths continue to work as specified.
  version: "3.0.0"

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  # ═══════════════════════════════════════════════════════════════
  #  ENCOURAGEMENT ENGINE
  # ═══════════════════════════════════════════════════════════════
  /api/encouragement/trigger:
    post:
      summary: Trigger an AI encouragement message based on user context
      description: |
        The server automatically gathers user and project state to determine
        which encouragement type to return. Only `project_id` and
        `trigger_event` are required — the backend pulls streak, progress,
        and task data from the database.

        Priority order (first match wins):
          1. 2% random chance → type "easter_egg"
          2. Dream progress threshold (25/50/75/90%) → type "reward"
          3. Streak milestone (7/15/30 days) → type "future"
          4. Stage completion → type "future"
          5. Project progress threshold (25/50/75%) → type "retrospective"
          6. Streak divisible by 7 (and >= 7) → type "retrospective"
          7. Default → type "growth"
      operationId: triggerEncouragement
      tags: [Encouragement]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncouragementRequest"
            examples:
              checkin:
                summary: Triggered after a task checkin
                value:
                  project_id: "a1b2c3d4"
                  trigger_event: "checkin"
                  task_id: "t1"
              stage_complete:
                summary: Triggered when a stage is completed
                value:
                  project_id: "a1b2c3d4"
                  trigger_event: "stage_complete"
              streak_milestone:
                summary: Triggered on streak milestones
                value:
                  project_id: "a1b2c3d4"
                  trigger_event: "streak_milestone"
              dream_milestone:
                summary: Triggered on dream-reward progress
                value:
                  project_id: "a1b2c3d4"
                  trigger_event: "dream_milestone"
      responses:
        "200":
          description: Encouragement message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncouragementResponse"
              examples:
                growth:
                  summary: Default growth message
                  value:
                    type: "growth"
                    icon: "🌱"
                    color: "#3B82F6"
                    message: "今天你又进步了一点。7天前，你还没开始这个项目。"
                    bonus: null
                reward:
                  summary: Dream progress milestone
                  value:
                    type: "reward"
                    icon: "🎁"
                    color: "#F59E0B"
                    message: "你已经完成了梦想奖励的 50%！键盘就在前方。"
                    bonus: null
                future:
                  summary: Streak or stage milestone
                  value:
                    type: "future"
                    icon: "🔮"
                    color: "#8B5CF6"
                    message: "你已经坚持了 30 天。再过 70 天，你就是百夫长了。"
                    bonus: null
                retrospective:
                  summary: Project progress or weekly streak
                  value:
                    type: "retrospective"
                    icon: "📊"
                    color: "#10B981"
                    message: "项目已完成 50%。回头看看，你已经完成了 6 个任务。"
                    bonus: null
                easter_egg:
                  summary: Rare random bonus
                  value:
                    type: "easter_egg"
                    icon: "✨"
                    color: "#EC4899"
                    message: "🌟 罕见的四叶草！你不仅完成了任务，还触发了隐藏奖励。"
                    bonus:
                      xp: 10
                      dream_multiplier: 1.1
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  # ═══════════════════════════════════════════════════════════════
  #  USER ANALYTICS
  # ═══════════════════════════════════════════════════════════════
  /api/users/me/analytics:
    get:
      summary: Get detailed analytics for the current user
      description: |
        Returns period-over-period comparison, daily trend, task type distribution,
        stage progress breakdown, radar scores, and lifetime summary.

        Period boundaries:
        - `week`: current week (Mon-Sun) vs previous week
        - `month`: current calendar month vs previous calendar month
        - `all`: all-time (previous period is the first half vs second half)
      operationId: getUserAnalytics
      tags: [Progress]
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [week, month, all]
            default: "week"
          description: Comparison period
      responses:
        "200":
          description: Full analytics response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
              example:
                period: "week"
                current:
                  tasks_completed: 12
                  xp_earned: 285
                  average_xp_per_day: 40.7
                  most_productive_day: "星期三"
                  streak_days: 7
                  completion_rate: 0.85
                previous:
                  tasks_completed: 8
                  xp_earned: 190
                  average_xp_per_day: 27.1
                  completion_rate: 0.65
                changes:
                  tasks_completed_pct: 50.0
                  xp_earned_pct: 50.0
                  completion_rate_pct: 30.8
                trend:
                  - date: "2026-06-01"
                    tasks: 2
                    xp: 45
                  - date: "2026-06-02"
                    tasks: 3
                    xp: 70
                  - date: "2026-06-03"
                    tasks: 1
                    xp: 20
                  - date: "2026-06-04"
                    tasks: 4
                    xp: 100
                  - date: "2026-06-05"
                    tasks: 0
                    xp: 0
                  - date: "2026-06-06"
                    tasks: 2
                    xp: 50
                  - date: "2026-06-07"
                    tasks: 0
                    xp: 0
                task_type_distribution:
                  theory:
                    count: 5
                    percent: 41.7
                  practice:
                    count: 5
                    percent: 41.7
                  output:
                    count: 2
                    percent: 16.7
                stage_progress:
                  - stage_title: "基础准备"
                    done: 4
                    doing: 0
                    pending: 0
                    total: 4
                    percent: 100.0
                  - stage_title: "控制流"
                    done: 2
                    doing: 1
                    pending: 0
                    total: 3
                    percent: 66.7
                radar:
                  completion: 85
                  efficiency: 72
                  streak: 65
                  quality: 90
                  speed: 55
                summary:
                  total_tasks_completed: 120
                  total_xp: 2850
                  total_days_active: 45
                  longest_streak: 30
                  current_streak: 7
                  favorite_type: "practice"
                  projects_completed: 0
                  stages_completed: 3
                  first_checkin_date: "2026-04-25"
        "422":
          description: Invalid period parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  # ═══════════════════════════════════════════════════════════════
  #  MILESTONES
  # ═══════════════════════════════════════════════════════════════
  /api/users/me/milestones:
    get:
      summary: Get all milestones with achievement status
      description: |
        Returns the 15 built-in milestones. Each has an `achieved` flag,
        an optional `achieved_at` timestamp, and the XP bonus on unlock.

        Milestones are a meta-layer above daily achievements — they track
        long-term progress markers like "first checkin", "30-day streak",
        "completed first project", etc.
      operationId: getUserMilestones
      tags: [Progress]
      responses:
