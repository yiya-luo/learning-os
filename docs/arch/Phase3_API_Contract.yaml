  # ═══════════════════════════════════════════════════════════════
  #  EVENT TIMELINE
  # ═══════════════════════════════════════════════════════════════
  /api/users/me/timeline:
    get:
      summary: Get paginated event timeline for the current user
      description: |
        Returns a chronological feed of all user events: milestone unlocks,
        achievement earns, task checkins, and stage completions. Filterable
        by event type and pageable for infinite scroll.
      operationId: getUserTimeline
      tags: [Progress]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based)
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of events per page
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [all, milestone, achievement, checkin, stage]
            default: "all"
          description: Filter by event type
      responses:
        "200":
          description: Paginated timeline events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineResponse"
              example:
                events:
                  - type: "checkin"
                    date: "2026-06-08"
                    title: "完成: 下载AAPL历史数据"
                    xp_earned: 30
                    task_type: "practice"
                  - type: "milestone"
                    date: "2026-06-07"
                    title: "月度坚守"
                    description: "连续打卡30天"
                    icon: "🏆"
                    color: "#FFD700"
                    xp_bonus: 50
                  - type: "achievement"
                    date: "2026-06-05"
                    title: "阶段完成者"
                    description: "完成Stage: 基础准备"
                    icon: "⭐"
                    color: "#8B5CF6"
                    xp_bonus: 40
                  - type: "stage"
                    date: "2026-06-05"
                    title: "完成阶段"
                    description: "基础准备"
                    stage_progress: 100.0
                    tasks_completed: 4
                  - type: "checkin"
                    date: "2026-06-04"
                    title: "完成: if-else 条件判断"
                    xp_earned: 20
                    task_type: "theory"
                pagination:
                  page: 1
                  page_size: 20
                  total: 87
                  has_more: true
        "422":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

# ═══════════════════════════════════════════════════════════════
#  COMPONENTS / SCHEMAS
# ═══════════════════════════════════════════════════════════════
components:
  schemas:
    # ──────────────────────────────────────────────
    #  Encouragement
    # ──────────────────────────────────────────────
    EncouragementRequest:
      type: object
      required: [project_id, trigger_event]
      properties:
        project_id:
          type: string
          description: Project UUID
        trigger_event:
          type: string
          enum: [checkin, stage_complete, streak_milestone, dream_milestone]
          description: |
            The event that triggered the encouragement request.
            - checkin: user just completed a task
            - stage_complete: user just finished all tasks in a stage
            - streak_milestone: user hit a streak threshold (7/15/30/100)
            - dream_milestone: user hit a dream-progress threshold (25/50/75/100%)
        task_id:
          type: string
          nullable: true
          description: |
            The task that triggered this (only meaningful for checkin events).
            Null for stage_complete, streak_milestone, and dream_milestone.

    EncouragementBonus:
      type: object
      properties:
        xp:
          type: integer
          minimum: 0
          description: Bonus XP awarded
        dream_multiplier:
          type: number
          format: float
          minimum: 1.0
          description: Temporary multiplier on dream value (e.g. 1.1 = +10%)

    EncouragementResponse:
      type: object
      properties:
        type:
          type: string
          enum: [growth, reward, future, retrospective, easter_egg]
          description: |
            The category of encouragement message.
            - growth: daily encouragement, always safe to show
            - reward: dream-progress milestone, celebrate the goal
            - future: streak or stage milestone, forward-looking
            - retrospective: project progress or weekly reflection
            - easter_egg: rare random bonus (2% chance)
        icon:
          type: string
          description: Emoji icon for the frontend card
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Hex color for the card accent
        message:
          type: string
          description: The AI-generated encouragement text (localized)
        bonus:
          $ref: "#/components/schemas/EncouragementBonus"
          nullable: true
          description: |
            Bonus reward data. Only present for easter_egg type; null for all others.

    # ──────────────────────────────────────────────
    #  Analytics
    # ──────────────────────────────────────────────
    AnalyticsPeriodData:
      type: object
      properties:
        tasks_completed:
          type: integer
          minimum: 0
          description: Number of tasks completed in this period
        xp_earned:
          type: integer
          minimum: 0
          description: Total XP earned in this period
        average_xp_per_day:
          type: number
          format: float
          minimum: 0
          description: Average XP per active day in this period
        most_productive_day:
          type: string
          nullable: true
          description: |
            Day of week with most checkins (Chinese: 星期一-星期日).
            Only present for `week` period. Null for `month` and `all`.
        streak_days:
          type: integer
          minimum: 0
          description: |
            Number of checkin days in this period.
            Only present for `week` and `month` periods. Not included in `all`.
        completion_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Ratio of days with at least one checkin vs total days in period

    AnalyticsChanges:
      type: object
      properties:
        tasks_completed_pct:
          type: number
          format: float
          description: |
            Percentage change in tasks completed (current vs previous).
            Positive = improvement. Null if previous period had 0 tasks.
        xp_earned_pct:
          type: number
          format: float
          description: Percentage change in XP earned (current vs previous)
        completion_rate_pct:
          type: number
          format: float
          description: Percentage-point change in completion rate

    TrendPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD
        tasks:
          type: integer
          minimum: 0
          description: Tasks completed on this date
        xp:
          type: integer
          minimum: 0
          description: XP earned on this date

    TaskTypeDistribution:
      type: object
      properties:
        count:
          type: integer
          minimum: 0
        percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Percentage of total tasks (sum of all three ≈ 100)

    TaskTypeBreakdown:
      type: object
      properties:
        theory:
          $ref: "#/components/schemas/TaskTypeDistribution"
        practice:
          $ref: "#/components/schemas/TaskTypeDistribution"
        output:
          $ref: "#/components/schemas/TaskTypeDistribution"

    StageProgressItem:
      type: object
      properties:
        stage_title:
          type: string
          description: Stage display name
        done:
          type: integer
          minimum: 0
          description: Tasks in 'done' status
        doing:
          type: integer
          minimum: 0
          description: Tasks in 'doing' status
        pending:
          type: integer
          minimum: 0
          description: Tasks in 'pending' status
        total:
          type: integer
          minimum: 0
          description: Total tasks in this stage
        percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Completion percentage (done / total * 100)

    RadarScores:
      type: object
      properties:
        completion:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Completion rate score.
            Formula: done_tasks / total_tasks * 100
        efficiency:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Efficiency score (capped at 100).
            Formula: min(actual_checkins / days_since_start * 100, 100)
        streak:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Streak score.
            Formula: current_streak / max(30, longest_streak) * 100
        quality:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Quality score.
            Formula: tasks_with_check_field_completed / total_done * 100
        speed:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Speed score.
            Formula: tasks_completed_before_estimate / total_done * 100

    AnalyticsSummary:
      type: object
      properties:
        total_tasks_completed:
          type: integer
          minimum: 0
          description: Lifetime total of completed tasks
        total_xp:
          type: integer
          minimum: 0
          description: Lifetime total XP
        total_days_active:
          type: integer
          minimum: 0
          description: Distinct days with at least one checkin
        longest_streak:
          type: integer
          minimum: 0
          description: Longest consecutive checkin streak ever
        current_streak:
          type: integer
          minimum: 0
          description: Current consecutive checkin streak
        favorite_type:
          type: string
          enum: [theory, practice, output]
          description: Most frequently completed task type
        projects_completed:
          type: integer
          minimum: 0
          description: Number of projects with 100% progress
        stages_completed:
          type: integer
          minimum: 0
          description: Number of stages fully completed (all tasks done)
        first_checkin_date:
          type: string
          format: date
          nullable: true
          description: Date of the very first checkin, null if never checked in

    AnalyticsResponse:
      type: object
      properties:
        period:
          type: string
          enum: [week, month, all]
          description: The requested comparison period
        current:
          $ref: "#/components/schemas/AnalyticsPeriodData"
          description: Current period metrics
        previous:
          $ref: "#/components/schemas/AnalyticsPeriodData"
          description: Previous period metrics for comparison
        changes:
          $ref: "#/components/schemas/AnalyticsChanges"
          description: Period-over-period percentage changes
        trend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
          description: Daily breakdown for the current period, ordered by date ascending
        task_type_distribution:
          $ref: "#/components/schemas/TaskTypeBreakdown"
          description: Task-type breakdown for the current period
        stage_progress:
          type: array
          items:
            $ref: "#/components/schemas/StageProgressItem"
          description: Per-stage progress across all projects, ordered by stage sort_order
        radar:
          $ref: "#/components/schemas/RadarScores"
          description: Five-axis radar scores (0-100 each)
        summary:
          $ref: "#/components/schemas/AnalyticsSummary"
          description: Lifetime summary stats (period-independent)

    # ──────────────────────────────────────────────
    #  Milestones
    # ──────────────────────────────────────────────
    Milestone:
      type: object
      properties:
        id:
          type: string
          description: Unique milestone identifier (e.g. "M001")
        name:
          type: string
          description: Human-readable milestone name in Chinese
        description:
          type: string
          description: What the user must accomplish to earn this milestone
        icon:
          type: string
          description: Emoji icon for frontend rendering
        achieved:
          type: boolean
          description: Whether the user has unlocked this milestone
        achieved_at:
          type: string
          format: date
          nullable: true
          description: Date when achieved, null if not yet unlocked
        xp_bonus:
          type: integer
          minimum: 0
          description: XP awarded on unlock

    MilestonesResponse:
      type: object
      properties:
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/Milestone"
          description: |
            All 15 milestones in order: achieved first (by achieved_at desc),
            then unachieved in ID order.
        achieved_count:
          type: integer
          minimum: 0
          maximum: 15
          description: Number of milestones the user has achieved
        total_count:
          type: integer
          enum: [15]
          description: Total number of milestones in the system (always 15)

    # ──────────────────────────────────────────────
    #  Timeline
    # ──────────────────────────────────────────────
    TimelineEvent:
      type: object
      discriminator:
        propertyName: type
        mapping:
          milestone: "#/components/schemas/TimelineMilestoneEvent"
          achievement: "#/components/schemas/TimelineAchievementEvent"
          checkin: "#/components/schemas/TimelineCheckinEvent"
          stage: "#/components/schemas/TimelineStageEvent"
      properties:
        type:
          type: string
          enum: [milestone, achievement, checkin, stage]
          description: Event type discriminator
        date:
          type: string
          format: date
          description: Date the event occurred
        title:
          type: string
          description: Short display title

    TimelineMilestoneEvent:
      allOf:
        - $ref: "#/components/schemas/_TimelineBase"
        - type: object
          properties:
            type:
              type: string
              enum: [milestone]
            description:
              type: string
              description: Milestone description
            icon:
              type: string
              description: Milestone emoji icon
            color:
              type: string
