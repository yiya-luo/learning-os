# ═══════════════════════════════════════════════════════════════
#  RADAR SCORE CALCULATION RULES
# ═══════════════════════════════════════════════════════════════
# These are implementation notes, not part of the OpenAPI contract.
# Included here for reference since they drive API behavior.
#
# Each radar axis is scored 0-100. The formulas are:
#
# completion (完成率):
#   completion = (done_tasks / total_tasks) * 100
#   - done_tasks: count of tasks with status "done"
#   - total_tasks: count of all tasks across all projects
#   - Edge case: total_tasks == 0 → score = 0
#
# efficiency (效率):
#   efficiency = min(actual_checkins / days_since_start * 100, 100)
#   - actual_checkins: count of distinct days with at least one checkin
#   - days_since_start: days between first_checkin_date and today
#   - Capped at 100 (user cannot be more than 100% efficient)
#   - Edge case: days_since_start == 0 → score = 0
#
# streak (连续打卡):
#   streak = (current_streak / max(30, longest_streak)) * 100
#   - Uses the larger of 30 or longest_streak as the denominator
#   - This means a 30-day base-line; if longest > 30, normalizes against it
#   - Edge case: current_streak == 0 → score = 0
#
# quality (质量):
#   quality = (tasks_with_check_field_completed / total_done) * 100
#   - tasks_with_check_field_completed: done tasks where `check` field is populated
#     AND the task was completed with the check verification flag set
#   - total_done: all tasks with status "done"
#   - Rationale: tasks with explicit acceptance criteria represent higher quality output
#   - Edge case: total_done == 0 → score = 0
#
# speed (速度):
#   speed = (tasks_completed_before_estimate / total_done) * 100
#   - tasks_completed_before_estimate: done tasks where actual_completion_time
#     (completed_at - started_at) <= estimate (in minutes)
#   - total_done: all tasks with status "done"
#   - Edge case: total_done == 0 → score = 0
#   - Edge case: task has no estimate → counted as "on time"

# ═══════════════════════════════════════════════════════════════
#  ENCOURAGEMENT TYPE SELECTION ALGORITHM
# ═══════════════════════════════════════════════════════════════
# The server evaluates conditions in this exact priority order.
# The FIRST matching condition wins.
#
# 1. EASTER_EGG (2% flat chance):
#    - Roll random 0-99; if result < 2, return type "easter_egg"
#    - Bonus: randomly pick +5/+10/+15 XP and 1.0/1.1/1.2 dream_multiplier
#    - This check runs BEFORE all others, so an easter egg can replace
#      any other encouragement type
#
# 2. REWARD (dream progress milestones):
#    - Check project dream_value progress %
#    - Thresholds: 25%, 50%, 75%, 90% (not 100% — that's handled as project completion)
#    - If the current progress just crossed a threshold (was below, now >= threshold)
#      return type "reward"
#
# 3. FUTURE — streak milestones:
#    - Streak exactly hits 7, 15, or 30 days
#    - Must be checked AFTER the streak update in the current checkin
#    - Returns type "future"
#
# 4. FUTURE — stage completion:
#    - trigger_event == "stage_complete"
#    - All tasks in a stage just transitioned to "done"
#    - Returns type "future"
#
# 5. RETROSPECTIVE — project progress:
#    - Project overall progress crosses 25%, 50%, or 75%
#    - Returns type "retrospective"
#
# 6. RETROSPECTIVE — 7-day streak interval:
#    - current_streak > 0 AND current_streak % 7 == 0
#    - But only if streak < 100 (to avoid double-triggering with milestone)
#    - Returns type "retrospective"
#
# 7. GROWTH (default):
#    - Always falls through to "growth" if no other condition matched
#    - Generates a general encouragement message
#
# Message generation:
#   Each type has a pool of template messages. The server selects one
#   based on context (user level, project title, numbers). Messages are
#   localized to Chinese.

# ═══════════════════════════════════════════════════════════════
#  MILESTONE DEFINITIONS (15 total)
# ═══════════════════════════════════════════════════════════════
# M001 — 首次启程: first checkin ever
# M002 — 周不懈怠: streak reaches 7
# M003 — 月度坚守: streak reaches 30
# M004 — 百日英雄: streak reaches 100
# M005 — 梦想起航: dream progress reaches 25%
# M006 — 梦想半程: dream progress reaches 50%
# M007 — 梦想冲刺: dream progress reaches 75%
# M008 — 梦想完成: dream progress reaches 100%
# M009 — 初出茅庐: total completed tasks >= 10
# M010 — 学海无涯: total completed tasks >= 50
# M011 — 水滴石穿: total completed tasks >= 100
# M012 — 阶段推进: first stage fully completed
# M013 — 项目完成: first project fully completed (100% progress)
# M014 — 全面发展: completed at least 1 theory + 1 practice + 1 output
# M015 — 天选之人: triggered at least 1 easter egg
#
# Milestones are evaluated after every checkin. Unlike achievements
# (which only fire once and return the first new one), milestones are
# always returned as a full list with achieved/not-achieved flag.
